<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup</title>
    <style>
        /* General Styles */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(135deg, #E0F2E9, #C8E6C9); /* Light pastel pistachio green */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Prevent scrolling */
        }

        .container {
            background: rgba(255, 255, 255, 0.8); /* Semi-transparent white */
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 20px; /* Reduced padding */
            width: 90%; /* Adjusted width */
            max-width: 400px; /* Smaller max-width */
            text-align: center;
            transition: transform 0.3s ease-in-out;
            overflow-y: auto; /* Add scroll if content overflows */
            max-height: 90vh; /* Limit height to 90% of viewport */
        }

        .container:hover {
            transform: scale(1.02);
        }

        h2 {
            color: #4CAF50; /* Pistachio green */
            font-weight: 700;
            margin-bottom: 15px; /* Reduced margin */
            font-size: 24px; /* Smaller font size */
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px; /* Reduced gap */
        }

        label {
            font-weight: 500;
            color: #4a4a4a;
            text-align: left;
            font-size: 14px; /* Smaller font size */
        }

        input[type="text"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 8px; /* Reduced padding */
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus,
        select:focus {
            border-color: #4CAF50; /* Pistachio green */
            outline: none;
        }

        textarea {
            resize: vertical;
            height: 60px; /* Reduced height */
        }

        button {
            width: 100%;
            padding: 10px; /* Reduced padding */
            background-color: #4CAF50; /* Pistachio green */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px; /* Smaller font size */
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #45a049; /* Slightly darker green */
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .or-divider {
            margin: 15px 0; /* Reduced margin */
            color: #4CAF50; /* Pistachio green */
            font-weight: 600;
            position: relative;
            font-size: 14px; /* Smaller font size */
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
            margin: auto;
        }

        .or-divider::before {
            margin-right: 10px;
        }

        .or-divider::after {
            margin-left: 10px;
        }

        #message {
            margin-top: 15px; /* Reduced margin */
            color: #4CAF50; /* Pistachio green */
            font-weight: bold;
            font-size: 14px; /* Smaller font size */
        }

        /* File Input Styling */
        input[type="file"] {
            padding: 6px; /* Reduced padding */
            background-color: #f0f7f4;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px; /* Smaller font size */
        }

        input[type="file"]:hover {
            border-color: #4CAF50; /* Pistachio green */
        }

        /* Dropdown Styling */
        select {
            appearance: none;
            background-color: #f0f7f4;
            cursor: pointer;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 15px; /* Further reduced padding */
                max-width: 350px; /* Smaller max-width */
            }

            h2 {
                font-size: 22px; /* Smaller font size */
            }

            label {
                font-size: 13px; /* Smaller font size */
            }

            input[type="text"],
            input[type="password"],
            textarea,
            select {
                font-size: 13px; /* Smaller font size */
            }

            button {
                font-size: 13px; /* Smaller font size */
            }

            .or-divider {
                font-size: 13px; /* Smaller font size */
            }

            #message {
                font-size: 13px; /* Smaller font size */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form id="loginForm">
            <label>Username: <input type="text" name="username" required></label>
            <label>Password: <input type="password" name="password" required></label>
            <button type="submit">Login</button>
        </form>

        <div class="or-divider">OR</div>

        <h2>Signup</h2>
        <form id="signupForm" enctype="multipart/form-data">
            <label>Username: <input type="text" name="username" required></label>
            <label>Role: <input type="text" name="role" required></label>
            <label>First Name: <input type="text" name="first_name" required></label>
            <label>Last Name: <input type="text" name="last_name" required></label>
            <label>Areas of Interest (comma separated): <input type="text" name="areas_of_interest" required></label>
            <label>Bio: <textarea name="bio"></textarea></label>
            <label>Micro Influencer:
                <select name="micro_influencer">
                    <option value="true">Yes</option>
                    <option value="false">No</option>
                </select>
            </label>
            <label>Allow Companies:
                <select name="allow_companies">
                    <option value="true">Yes</option>
                    <option value="false">No</option>
                </select>
            </label>
            <label>Country:
                <select name="country" id="countryDropdown"></select>
            </label>
            <label>Stay Informed:
                <select name="stay_informed">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </label>
            <label>Profile Picture: <input type="file" name="profile_picture"></label>
            <label>Password: <input type="password" name="password" required></label>
            <button type="submit">Sign Up</button>
        </form>
        <p id="message"></p>
    </div>

    <script>
        // Fetch Countries
        async function loadCountries() {
            try {
                let response = await fetch("/countries");
                let data = await response.json();
                let dropdown = document.getElementById("countryDropdown");
                data.countries.forEach(country => {
                    let option = document.createElement("option");
                    option.value = country;
                    option.textContent = country;
                    dropdown.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading countries:", error);
            }
        }
        loadCountries();

        // Handle Login Form Submission
        document.getElementById("loginForm").addEventListener("submit", async function(event) {
            event.preventDefault();
            let formData = new FormData(this);
            let response = await fetch("/login", {
                method: "POST",
                body: new URLSearchParams(formData)
            });
            if (response.redirected) {
                window.location.href = response.url;
            }
        });

        // Handle Signup Form Submission
        document.getElementById("signupForm").addEventListener("submit", async function(event) {
            event.preventDefault();
            let formData = new FormData(this);
            let response = await fetch("/signup", {
                method: "POST",
                body: formData
            });
            let result = await response.json();
            document.getElementById("message").textContent = result.message;
        });
    </script>
</body>
</html>
